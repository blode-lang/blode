<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blode Language | Official Site</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="terminal">
        <header>
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
            <p>blode.exe</p>
        </header>
        <section class="content">
            <h1>🥬 Blode Programming Language</h1>
            <p class="subtitle">Simple. Direct. Action-oriented.</p>
            
            <div class="code-box">
                <span class="comment">// Your first Blode script</span><br>
                <span class="keyword">#contain</span> &lt;sysio&gt;<br><br>
                <span class="keyword">act</span> main() {<br>
                &nbsp;&nbsp;sys.output = <span class="string">"Hello, World!"</span>;<br>
                }
            </div>

            <nav>
                <a href="../docs/about.md">Documentation</a>
                <a href="https://github.com/blode-lang/blode">GitHub</a>
            </nav>
        </section>
    </div>
</body>
</html>
